# =============================================================================
# Lead Monitor - GitHub Actions Workflow
# =============================================================================
# Runs the full scan cycle every 30 minutes, completely free.
# Also sends a daily digest at 9 AM UTC.
#
# SETUP - only 2 secrets needed:
# Go to repo Settings > Secrets and variables > Actions > New repository secret
#
#   ANTHROPIC_API_KEY  - from console.anthropic.com/settings/keys
#   NTFY_TOPIC         - your ntfy.sh topic name (e.g. advance-ai-leads)
#
# Reddit needs NO secrets - uses public JSON endpoints.
# ntfy.sh needs NO account - just the topic name you subscribed to in the app.

name: Lead Monitor

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
    # Daily digest at 9 AM UTC
    - cron: '0 9 * * *'

  # Allow manual trigger from GitHub UI (Actions tab > Run workflow)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - reddit
          - forums
          - hn
          - bluesky
          - jobs
          - digest
          - test

# Prevent multiple scans running at once
concurrency:
  group: lead-monitor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps || true

      - name: Create data directory
        run: mkdir -p data

      # Restore database from the previous run via GitHub Actions cache.
      # Each run saves with a unique key (run_id), and restore falls back
      # to the most recent matching prefix. This ensures leads persist
      # across runs so you never see the same lead twice.
      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: data/leads.db
          key: lead-monitor-db-${{ github.run_id }}
          restore-keys: |
            lead-monitor-db-

      # Determine scan mode
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "mode=digest" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      # Run the scan (only 2 secrets needed)
      - name: Run Lead Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          case "$MODE" in
            reddit)   python main.py --reddit ;;
            forums)   python main.py --forums ;;
            hn)       python main.py --hn ;;
            bluesky)  python main.py --bluesky ;;
            jobs)     python main.py --jobs ;;
            digest)   python main.py --digest ;;
            test)     python main.py --test ;;
            *)        python main.py ;;
          esac

      # Save database for next run (unique key per run, auto-evicts old ones)
      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/leads.db
          key: lead-monitor-db-${{ github.run_id }}

      # Generate the leads dashboard HTML
      - name: Generate leads dashboard
        run: python report.py --output _site

      # Save logs for debugging
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-logs-${{ github.run_id }}
          path: data/monitor.log
          retention-days: 7

      # Deploy dashboard to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: _site

  # Deploy to GitHub Pages (separate job - requires pages permission)
  deploy:
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
